  <body style="background: #042e4a; margin: 0">
    <script id="custom-config" type="text/plain">
      app-name=Fort RC
      [override-settings]
      view_style=adaptive
      image_quality=low
    </script>
    <script>
      (() => {
        window.addEventListener("message", (e) => {
          let result = null;
          const { type, remoteSessionId, clientId, token, server, key } =
            e.data;
          if (
            type !== "REMOTE_SESSION_READY" ||
            !remoteSessionId ||
            !clientId ||
            !token ||
            !server ||
            !key
          )
            return;
          const detail = Object.freeze({
            remoteSessionId,
            clientId,
            token,
            server,
            key,
            response: (r) => (result = r),
          });
          setTimeout(() => {
            document.dispatchEvent(new CustomEvent("connection", { detail }));
            console.log("connection result ", result);
            e.source.postMessage({ type: "ACK", result: true }, e.origin);
          }, 800);
        });
      })();
    </script>
  </body>
</html>
